name: Feature request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature. Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem are you trying to solve? What's the user pain?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case / context
      description: A concrete example of when and how you would use this feature.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered, or existing workarounds you've tried.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, anything else relevant.
    validations:
      required: false
